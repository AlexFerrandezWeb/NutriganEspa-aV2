<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin — Nutrigan España</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="icon" href="assets/favicon.png">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; font-size: 14px; }

        .login-card { background: white; border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 420px; box-shadow: 0 8px 40px rgba(0,0,0,0.12); }
        .login-logo { display: block; width: 160px; margin: 0 auto 24px; }
        .login-card h1 { text-align: center; font-size: 1.3rem; color: #1d4d35; margin-bottom: 8px; }
        .login-subtitle { text-align: center; color: #888; font-size: 0.85rem; margin-bottom: 32px; }

        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.82rem; font-weight: 500; margin-bottom: 5px; color: #555; }
        input[type="email"], input[type="password"], input[type="text"].pass-input {
            width: 100%; padding: 8px 11px; border: 1px solid #ddd; border-radius: 8px;
            font-size: 0.875rem; font-family: inherit; outline: none; transition: border-color 0.15s; background: white;
        }
        input:focus { border-color: #1d815d; box-shadow: 0 0 0 3px rgba(29,129,93,0.08); }

        .pass-wrap { position: relative; }
        .pass-wrap input { padding-right: 40px; }
        .pass-toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #aaa; padding: 2px; line-height: 1; font-size: 1rem; }
        .pass-toggle:hover { color: #555; }
        .hidden { display: none; }
        .caps-warning { display: none; align-items: center; gap: 5px; margin-top: 6px; font-size: 0.78rem; color: #b45309; }
        .caps-warning.visible { display: flex; }

        @media (max-width: 480px) {
            body { padding: 16px; align-items: flex-start; padding-top: 40px; }
            .login-card { padding: 32px 24px; border-radius: 12px; }
            .login-logo { width: 130px; }
        }

        .btn { display: inline-flex; align-items: center; justify-content: center; padding: 8px 16px; border-radius: 8px; border: none; font-size: 0.875rem; font-weight: 500; cursor: pointer; transition: all 0.15s; width: 100%; }
        .btn:disabled { opacity: 0.55; cursor: not-allowed; }
        .btn-primary { background: #1d815d; color: white; }
        .btn-primary:hover:not(:disabled) { background: #16694c; }

        .error-msg { background: #fff2f2; color: #c53030; border-radius: 8px; padding: 10px 14px; font-size: 0.85rem; margin-bottom: 14px; border-left: 3px solid #e53e3e; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="assets/logo_nutriganesp.png" alt="Nutrigan España" class="login-logo">
        <h1>Panel de Administración</h1>
        <p class="login-subtitle">Acceso restringido</p>
        <div id="login-error" class="error-msg" hidden></div>
        <form id="login-form">
            <div class="form-group">
                <label for="inp-email">Email</label>
                <input type="email" id="inp-email" required placeholder="admin@nutrigan.com" autocomplete="username">
            </div>
            <div class="form-group" style="margin-bottom:24px">
                <label for="inp-pass">Contraseña</label>
                <div class="pass-wrap">
                    <input type="password" id="inp-pass" class="pass-input" required placeholder="••••••••" autocomplete="current-password">
                    <button type="button" class="pass-toggle" onclick="togglePass()" title="Mostrar/ocultar contraseña" aria-label="Mostrar contraseña">
                        <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg id="eye-off-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                </div>
                <div id="caps-warning" class="caps-warning">
                    <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                    Bloq Mayús activado
                </div>
            </div>
            <button type="submit" class="btn btn-primary" id="login-btn">Entrar</button>
        </form>
    </div>

<script>
    const SUPABASE_URL = 'https://sajxwtxafdtcrlynegqp.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_J5S8W6Ume00gCtaKcUInZw_SoJnyKb1';
    const { createClient } = window.supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

    // Si ya hay sesión activa, ir directo al panel
    sb.auth.getSession().then(({ data: { session } }) => {
        if (session) window.location.href = 'admin-panel.html';
    });

    document.getElementById('login-form').addEventListener('submit', async e => {
        e.preventDefault();
        const btn = document.getElementById('login-btn');
        const err = document.getElementById('login-error');
        btn.disabled = true;
        btn.textContent = 'Entrando...';
        err.hidden = true;

        const { error } = await sb.auth.signInWithPassword({
            email:    document.getElementById('inp-email').value,
            password: document.getElementById('inp-pass').value
        });

        if (error) {
            err.textContent = 'Email o contraseña incorrectos.';
            err.hidden = false;
            btn.disabled = false;
            btn.textContent = 'Entrar';
        } else {
            window.location.href = 'admin-panel.html';
        }
    });

    document.getElementById('inp-pass').addEventListener('keyup', e => {
        const caps = e.getModifierState && e.getModifierState('CapsLock');
        document.getElementById('caps-warning').classList.toggle('visible', caps);
    });

    function togglePass() {
        const inp = document.getElementById('inp-pass');
        const show = inp.type === 'password';
        inp.type = show ? 'text' : 'password';
        document.getElementById('eye-icon').classList.toggle('hidden', !show);
        document.getElementById('eye-off-icon').classList.toggle('hidden', show);
    }
</script>
</body>
</html>
